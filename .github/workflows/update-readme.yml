name: Update README

on:
  push:
    branches: [main]
    paths: ['registry.json']

jobs:
  update-readme:
    name: Update extensions table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Update README
        run: node scripts/update-readme.js
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update extensions table in README"
          git push
